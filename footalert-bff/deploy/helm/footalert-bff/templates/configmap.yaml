apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "footalert-bff.fullname" . }}-config
  labels:
    {{- include "footalert-bff.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.globalEnv }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- range $key, $value := .Values.observabilityEnv }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
