components:
  securitySchemes:
    MobileSessionBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
    NotificationsIngestBearer:
      type: http
      scheme: bearer
      bearerFormat: InternalIngestToken

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: '^[1-9]\\d*$'
    TeamIdPath:
      name: teamId
      in: path
      required: true
      schema:
        type: string
        pattern: '^[1-9]\\d*$'
    PlayerIdPath:
      name: playerId
      in: path
      required: true
      schema:
        type: string
        pattern: '^[1-9]\\d*$'
    FixtureIdPath:
      name: fixtureId
      in: path
      required: true
      schema:
        type: string
        pattern: '^[1-9]\\d*$'
    TokenPath:
      name: token
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    NotificationDeviceIdQuery:
      name: deviceId
      in: query
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 256
    NotificationScopeKindQuery:
      name: scopeKind
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/NotificationScopeKind'
    NotificationScopeIdQuery:
      name: scopeId
      in: query
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
    DateQuery:
      name: date
      in: query
      required: true
      schema:
        type: string
        format: date
    QQuery:
      name: q
      in: query
      required: true
      schema:
        type: string
        minLength: 1
    TimezoneQuery:
      name: timezone
      in: query
      required: true
      schema:
        type: string
        minLength: 1
    OptionalTimezoneQuery:
      name: timezone
      in: query
      required: false
      schema:
        type: string
        minLength: 1
    LeagueIdQuery:
      name: leagueId
      in: query
      required: true
      schema:
        type: string
        pattern: '^[1-9]\\d*$'
    OptionalLeagueIdQuery:
      name: leagueId
      in: query
      required: false
      schema:
        type: string
        pattern: '^[1-9]\\d*$'
    TeamIdQuery:
      name: teamId
      in: query
      required: true
      schema:
        type: string
        pattern: '^[1-9]\\d*$'
    SeasonQuery:
      name: season
      in: query
      required: true
      schema:
        type: integer
        minimum: 2000
        maximum: 2100
    OptionalSeasonQuery:
      name: season
      in: query
      required: false
      schema:
        type: integer
        minimum: 2000
        maximum: 2100
    SeasonPath:
      name: season
      in: path
      required: true
      schema:
        type: integer
        minimum: 2000
        maximum: 2100
    OptionalPageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
    OptionalLimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 10
        maximum: 100
    SearchLimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 20
    OptionalCursorQuery:
      name: cursor
      in: query
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 2048
    OptionalNextQuery:
      name: next
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 10
    OptionalLastQuery:
      name: last
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 20
    OptionalStatisticsPeriodQuery:
      name: period
      in: query
      required: false
      schema:
        type: string
        enum: [ all, first, second ]
    LeagueIdsQuery:
      name: leagueIds
      in: query
      required: true
      schema:
        type: string
        description: Comma-separated league ids
        pattern: '^[0-9]+(,[0-9]+)*$'
    IdsQuery:
      name: ids
      in: query
      required: true
      schema:
        type: string
        description: Comma-separated numeric ids
        pattern: '^[1-9]\\d*(,[1-9]\\d*)*$'
    HistorySeasonsQuery:
      name: historySeasons
      in: query
      required: false
      schema:
        type: string
        description: Optional comma-separated list of historical seasons
        pattern: '^\\d{4}(,\\d{4})*$'
    PlayerStatsTypeQuery:
      name: type
      in: query
      required: true
      schema:
        type: string
        enum: [ topscorers, topassists, topyellowcards, topredcards ]

  responses:
    ListEnvelopeResponse:
      description: API response envelope with list payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListEnvelope'
    PagedEnvelopeResponse:
      description: API response envelope with list + paging
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PagedEnvelope'
    OptionalEnvelopeResponse:
      description: API response envelope with optional payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OptionalEnvelope'
    CareerAggregateResponse:
      description: Player career aggregate payload
      content:
        application/json:
          schema:
            type: object
            required: [ response ]
            properties:
              response:
                type: object
                properties:
                  seasons:
                    type: array
                    items:
                      $ref: '#/components/schemas/FlexibleObject'
                  teams:
                    type: array
                    items:
                      $ref: '#/components/schemas/FlexibleObject'
    AcceptedTelemetryResponse:
      description: Telemetry payload accepted
      content:
        application/json:
          schema:
            type: object
            required: [ status, type ]
            properties:
              status:
                type: string
                enum: [ accepted ]
              type:
                type: string
                enum: [ event, event_batch, error, error_batch, breadcrumb, breadcrumb_batch ]
              count:
                type: integer
                minimum: 1
    ProblemResponse:
      description: Error payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemResponse'
    SearchGlobalResponse:
      description: Normalized global search payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SearchGlobalResponse'
    TeamOverviewResponse:
      description: Aggregated team overview payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TeamOverviewResponse'

  schemas:
    TrendCompetitionItem:
      type: object
      required: [ competitionId, competitionName, competitionLogo, country, type ]
      properties:
        competitionId:
          type: string
        competitionName:
          type: string
        competitionLogo:
          type: string
        country:
          type: string
        type:
          type: string
    TrendCompetitionsResponse:
      type: object
      required: [ competitions ]
      properties:
        competitions:
          type: array
          items:
            $ref: '#/components/schemas/TrendCompetitionItem'
    HealthResponse:
      type: object
      required: [ status, cache ]
      properties:
        status:
          type: string
          enum: [ ok, degraded ]
        cache:
          type: object
          required: [ backend, strictMode, redis, degraded ]
          properties:
            backend:
              type: string
              enum: [ memory, redis ]
            strictMode:
              type: boolean
            redis:
              type: object
              required: [ configured, ready, prefix, lastError ]
              properties:
                configured:
                  type: boolean
                ready:
                  type: boolean
                prefix:
                  type: string
                lastError:
                  oneOf:
                    - type: string
                    - type: 'null'
            degraded:
              type: boolean
    FlexibleObject:
      type: object
      additionalProperties: true
    CursorPageInfo:
      type: object
      required: [ hasMore, nextCursor, returnedCount ]
      properties:
        hasMore:
          type: boolean
        nextCursor:
          oneOf:
            - type: string
            - type: 'null'
        returnedCount:
          type: integer
          minimum: 0
    ListEnvelope:
      type: object
      required: [ response ]
      properties:
        response:
          type: array
          items:
            $ref: '#/components/schemas/FlexibleObject'
        pageInfo:
          oneOf:
            - $ref: '#/components/schemas/CursorPageInfo'
            - type: 'null'
    PagedEnvelope:
      type: object
      required: [ response ]
      properties:
        response:
          type: array
          items:
            $ref: '#/components/schemas/FlexibleObject'
        paging:
          oneOf:
            - type: object
              additionalProperties: true
            - type: 'null'
        pageInfo:
          oneOf:
            - $ref: '#/components/schemas/CursorPageInfo'
            - type: 'null'
    OptionalEnvelope:
      type: object
      properties:
        response:
          oneOf:
            - $ref: '#/components/schemas/FlexibleObject'
            - type: array
              items:
                $ref: '#/components/schemas/FlexibleObject'
            - type: number
            - type: string
            - type: boolean
            - type: 'null'
    ProblemResponse:
      type: object
      required: [ error, message ]
      properties:
        error:
          type: string
        message:
          type: string
        details:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
            - type: 'null'
    SearchTeamResult:
      type: object
      required: [ id, name, logo, country ]
      properties:
        id:
          type: string
        name:
          type: string
        logo:
          type: string
        country:
          type: string
    SearchCompetitionResult:
      type: object
      required: [ id, name, logo, country, type ]
      properties:
        id:
          type: string
        name:
          type: string
        logo:
          type: string
        country:
          type: string
        type:
          type: string
    SearchPlayerResult:
      type: object
      required: [ id, name, photo, position, teamName, teamLogo, leagueName ]
      properties:
        id:
          type: string
        name:
          type: string
        photo:
          type: string
        position:
          type: string
        teamName:
          type: string
        teamLogo:
          type: string
        leagueName:
          type: string
    SearchMatchResult:
      type: object
      required:
        [
          fixtureId,
          startDate,
          statusShort,
          statusLong,
          competitionId,
          competitionName,
          competitionCountry,
          competitionLogo,
          homeTeamId,
          homeTeamName,
          homeTeamLogo,
          awayTeamId,
          awayTeamName,
          awayTeamLogo,
          homeGoals,
          awayGoals,
        ]
      properties:
        fixtureId:
          type: string
        startDate:
          type: string
          format: date-time
        statusShort:
          type: string
        statusLong:
          type: string
        competitionId:
          type: string
        competitionName:
          type: string
        competitionCountry:
          type: string
        competitionLogo:
          type: string
        homeTeamId:
          type: string
        homeTeamName:
          type: string
        homeTeamLogo:
          type: string
        awayTeamId:
          type: string
        awayTeamName:
          type: string
        awayTeamLogo:
          type: string
        homeGoals:
          oneOf:
            - type: integer
            - type: 'null'
        awayGoals:
          oneOf:
            - type: integer
            - type: 'null'
    SearchGlobalResponse:
      type: object
      required: [ teams, competitions, players, matches, meta ]
      properties:
        teams:
          type: array
          items:
            $ref: '#/components/schemas/SearchTeamResult'
        competitions:
          type: array
          items:
            $ref: '#/components/schemas/SearchCompetitionResult'
        players:
          type: array
          items:
            $ref: '#/components/schemas/SearchPlayerResult'
        matches:
          type: array
          items:
            $ref: '#/components/schemas/SearchMatchResult'
        meta:
          $ref: '#/components/schemas/SearchGlobalMeta'
    SearchGlobalMeta:
      type: object
      required: [ partial, degradedSources ]
      properties:
        partial:
          type: boolean
        degradedSources:
          type: array
          items:
            type: string
    TeamMatchItem:
