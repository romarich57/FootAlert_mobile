openapi: 3.1.0
info:
  title: FootAlert BFF API
  version: 1.0.0
  description: |
    Public contract consumed by FootAlert clients (mobile, web, desktop).
    This spec intentionally uses broad payload schemas because upstream API-Football
    structures can evolve, while preserving endpoint/query/path contracts.
servers:
  - url: http://localhost:3001
    description: Local BFF server
  - url: https://staging-api.footalert.example.com
    description: Staging BFF server
security:
  - MobileSessionBearer: []

paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is degraded (strict cache backend not ready)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop
      - ops

  /v1/matches:
    get:
      summary: List fixtures by date
      operationId: getMatchesByDate
      parameters:
        - $ref: '#/components/parameters/DateQuery'
        - $ref: '#/components/parameters/TimezoneQuery'
        - $ref: '#/components/parameters/OptionalLimitQuery'
        - $ref: '#/components/parameters/OptionalCursorQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/matches/{id}:
    get:
      summary: Get fixture details by id
      operationId: getMatchById
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/TimezoneQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/matches/{id}/events:
    get:
      summary: Get fixture events
      operationId: getMatchEvents
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/matches/{id}/statistics:
    get:
      summary: Get fixture statistics
      operationId: getMatchStatistics
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/OptionalStatisticsPeriodQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/matches/{id}/lineups:
    get:
      summary: Get fixture lineups
      operationId: getMatchLineups
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/matches/{id}/head-to-head:
    get:
      summary: Get head-to-head fixtures for match teams
      operationId: getMatchHeadToHead
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/OptionalTimezoneQuery'
        - $ref: '#/components/parameters/OptionalLastQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/matches/{id}/predictions:
    get:
      summary: Get fixture predictions
      operationId: getMatchPredictions
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/matches/{id}/players/{teamId}/stats:
    get:
      summary: Get fixture player stats for one team
      operationId: getMatchPlayersStatsByTeam
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/TeamIdPath'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/matches/{id}/absences:
    get:
      summary: Get absences (injuries/suspensions) for both match teams
      operationId: getMatchAbsences
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/OptionalTimezoneQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/competitions:
    get:
      summary: List competitions
      operationId: getCompetitions
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/competitions/search:
    get:
      summary: Search competitions by query
      operationId: searchCompetitions
      parameters:
        - $ref: '#/components/parameters/QQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/competitions/{id}:
    get:
      summary: Get competition details by id
      operationId: getCompetitionById
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/competitions/{id}/standings:
    get:
      summary: Get competition standings
      operationId: getCompetitionStandings
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/SeasonQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/competitions/{id}/matches:
    get:
      summary: Get competition matches
      operationId: getCompetitionMatches
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/SeasonQuery'
        - $ref: '#/components/parameters/OptionalLimitQuery'
        - $ref: '#/components/parameters/OptionalCursorQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/competitions/{id}/player-stats:
    get:
      summary: Get competition player stats by type
      operationId: getCompetitionPlayerStats
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/SeasonQuery'
        - $ref: '#/components/parameters/PlayerStatsTypeQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/competitions/{id}/transfers:
    get:
      summary: Get competition transfers
      operationId: getCompetitionTransfers
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/OptionalSeasonQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/competitions/{id}/bracket:
    get:
      tags: [competitions]
      summary: Get competition bracket
      operationId: getCompetitionBracket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^\d+$'
        - name: season
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Competition bracket data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompetitionBracketResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/teams/standings:
    get:
      summary: Get league standings for teams endpoint
      operationId: getTeamsStandings
      parameters:
        - $ref: '#/components/parameters/LeagueIdQuery'
        - $ref: '#/components/parameters/SeasonQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/teams/{id}:
    get:
      summary: Get team details
      operationId: getTeamById
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/teams/{id}/leagues:
    get:
      summary: Get leagues for a team
      operationId: getTeamLeagues
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/teams/{id}/fixtures:
    get:
      summary: Get team fixtures
      operationId: getTeamFixtures
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/OptionalSeasonQuery'
        - $ref: '#/components/parameters/OptionalLeagueIdQuery'
        - $ref: '#/components/parameters/OptionalTimezoneQuery'
        - $ref: '#/components/parameters/OptionalNextQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/teams/{id}/next-fixture:
    get:
      summary: Get next fixture for team
      operationId: getTeamNextFixture
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/TimezoneQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/teams/{id}/overview:
    get:
      summary: Get aggregated team overview for mobile details screens
      operationId: getTeamOverview
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/LeagueIdQuery'
        - $ref: '#/components/parameters/SeasonQuery'
        - $ref: '#/components/parameters/TimezoneQuery'
        - $ref: '#/components/parameters/HistorySeasonsQuery'
      responses:
        '200':
          $ref: '#/components/responses/TeamOverviewResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile

  /v1/teams/{id}/advanced-stats:
    get:
      summary: Get advanced team stats
      operationId: getTeamAdvancedStats
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/LeagueIdQuery'
        - $ref: '#/components/parameters/SeasonQuery'
      responses:
        '200':
          $ref: '#/components/responses/OptionalEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/teams/{id}/stats:
    get:
      summary: Get team statistics
      operationId: getTeamStats
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/LeagueIdQuery'
        - $ref: '#/components/parameters/SeasonQuery'
      responses:
        '200':
          $ref: '#/components/responses/OptionalEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/teams/{id}/players:
    get:
      summary: Get team players (paged)
      operationId: getTeamPlayers
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/LeagueIdQuery'
        - $ref: '#/components/parameters/SeasonQuery'
        - $ref: '#/components/parameters/OptionalPageQuery'
        - $ref: '#/components/parameters/OptionalLimitQuery'
        - $ref: '#/components/parameters/OptionalCursorQuery'
      responses:
        '200':
          $ref: '#/components/responses/PagedEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/teams/{id}/squad:
    get:
      summary: Get team squad
      operationId: getTeamSquad
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/teams/{id}/transfers:
    get:
      summary: Get team transfers
      operationId: getTeamTransfers
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/teams/{id}/trophies:
    get:
      summary: Get team trophies
      operationId: getTeamTrophies
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/players/{id}:
    get:
      summary: Get player details for a season
      operationId: getPlayerDetails
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/SeasonQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/players/{id}/seasons:
    get:
      summary: Get player seasons
      operationId: getPlayerSeasons
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/players/{id}/trophies:
    get:
      summary: Get player trophies
      operationId: getPlayerTrophies
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/players/{id}/career:
    get:
      summary: Get player career aggregates
      operationId: getPlayerCareer
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/CareerAggregateResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/players/team/{teamId}/fixtures:
    get:
      summary: Get fixtures for a team (players context)
      operationId: getPlayerTeamFixtures
      parameters:
        - $ref: '#/components/parameters/TeamIdPath'
        - $ref: '#/components/parameters/SeasonQuery'
        - $ref: '#/components/parameters/OptionalLastQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/players/fixtures/{fixtureId}/team/{teamId}/stats:
    get:
      summary: Get fixture player stats for a team
      operationId: getFixturePlayerStats
      parameters:
        - $ref: '#/components/parameters/FixtureIdPath'
        - $ref: '#/components/parameters/TeamIdPath'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/players/{id}/matches:
    get:
      summary: Get aggregated player matches
      operationId: getPlayerMatches
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - $ref: '#/components/parameters/TeamIdQuery'
        - $ref: '#/components/parameters/SeasonQuery'
        - $ref: '#/components/parameters/OptionalLastQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/follows/search/teams:
    get:
      summary: Search teams for follows feature
      operationId: searchFollowTeams
      parameters:
        - $ref: '#/components/parameters/QQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/follows/search/players:
    get:
      summary: Search players for follows feature
      operationId: searchFollowPlayers
      parameters:
        - $ref: '#/components/parameters/QQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/search/global:
    get:
      summary: Global search for teams, competitions, players and matches
      operationId: searchGlobal
      parameters:
        - $ref: '#/components/parameters/QQuery'
        - $ref: '#/components/parameters/TimezoneQuery'
        - $ref: '#/components/parameters/OptionalSeasonQuery'
        - $ref: '#/components/parameters/SearchLimitQuery'
      responses:
        '200':
          $ref: '#/components/responses/SearchGlobalResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile

  /v1/follows/teams/{teamId}:
    get:
      summary: Get followed team details
      operationId: getFollowTeam
      parameters:
        - $ref: '#/components/parameters/TeamIdPath'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/follows/teams/{teamId}/next-fixture:
    get:
      summary: Get next fixture for followed team
      operationId: getFollowTeamNextFixture
      parameters:
        - $ref: '#/components/parameters/TeamIdPath'
        - $ref: '#/components/parameters/TimezoneQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/follows/teams/cards:
    get:
      summary: Get aggregated cards for followed teams
      operationId: getFollowTeamCards
      parameters:
        - $ref: '#/components/parameters/IdsQuery'
        - $ref: '#/components/parameters/TimezoneQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile

  /v1/follows/players/{playerId}/season/{season}:
    get:
      summary: Get followed player stats by season
      operationId: getFollowPlayerSeason
      parameters:
        - $ref: '#/components/parameters/PlayerIdPath'
        - $ref: '#/components/parameters/SeasonPath'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/follows/players/cards:
    get:
      summary: Get aggregated cards for followed players
      operationId: getFollowPlayerCards
      parameters:
        - $ref: '#/components/parameters/IdsQuery'
        - $ref: '#/components/parameters/SeasonQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile

  /v1/follows/trends/teams:
    get:
      summary: Get trending teams
      operationId: getFollowTeamsTrends
      parameters:
        - $ref: '#/components/parameters/LeagueIdsQuery'
        - $ref: '#/components/parameters/SeasonQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/follows/trends/players:
    get:
      summary: Get trending players
      operationId: getFollowPlayersTrends
      parameters:
        - $ref: '#/components/parameters/LeagueIdsQuery'
        - $ref: '#/components/parameters/SeasonQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/follows/trends/competitions:
    get:
      summary: Get curated list of top competitions for onboarding
      operationId: getFollowCompetitionsTrends
      responses:
        '200':
          description: Top competitions list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrendCompetitionsResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/follows/search/competitions:
    get:
      summary: Search competitions for follows feature
      operationId: searchFollowCompetitions
      parameters:
        - $ref: '#/components/parameters/QQuery'
      responses:
        '200':
          $ref: '#/components/responses/ListEnvelopeResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile
      - web
      - desktop

  /v1/mobile/session/challenge:
    post:
      summary: Create short-lived mobile attestation challenge
      operationId: createMobileSessionChallenge
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileSessionChallengeRequest'
      responses:
        '200':
          description: Challenge created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileSessionChallengeResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile

  /v1/mobile/session/attest:
    post:
      summary: Verify mobile attestation and issue short-lived session token
      operationId: attestMobileSession
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileSessionAttestRequest'
      responses:
        '200':
          description: Session token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileSessionAttestResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile

  /v1/mobile/session/refresh:
    post:
      summary: Rotate refresh token and issue a new short-lived session token
      operationId: refreshMobileSession
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileSessionRefreshRequest'
      responses:
        '200':
          description: Session token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileSessionAttestResponse'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile

  /v1/mobile/session/revoke:
    post:
      summary: Revoke refresh-token family
      operationId: revokeMobileSession
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileSessionRevokeRequest'
      responses:
        '204':
          description: Session family revoked
        '400':
          $ref: '#/components/responses/ProblemResponse'
    x-platform-scope:
      - mobile

  /v1/mobile/privacy/erase:
    post:
      summary: Erase device-bound personal data after fresh attestation proof
      operationId: eraseMobilePrivacyData
      security:
        - MobileSessionBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobilePrivacyEraseRequest'
      responses:
        '200':
          description: Device-bound data erased
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobilePrivacyEraseResponse'
        '400':
          $ref: '#/components/responses/ProblemResponse'
        '401':
