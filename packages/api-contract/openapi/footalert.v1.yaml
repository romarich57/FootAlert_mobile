          leagueId,
          leagueName,
          leagueLogo,
          date,
          round,
          venue,
          status,
          statusLabel,
          minute,
          homeTeamId,
          homeTeamName,
          homeTeamLogo,
          awayTeamId,
          awayTeamName,
          awayTeamLogo,
          homeGoals,
          awayGoals,
        ]
      properties:
        fixtureId:
          type: string
        leagueId:
          oneOf:
            - type: string
            - type: 'null'
        leagueName:
          oneOf:
            - type: string
            - type: 'null'
        leagueLogo:
          oneOf:
            - type: string
            - type: 'null'
        date:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
        round:
          oneOf:
            - type: string
            - type: 'null'
        venue:
          oneOf:
            - type: string
            - type: 'null'
        status:
          type: string
          enum: [ upcoming, live, finished ]
        statusLabel:
          oneOf:
            - type: string
            - type: 'null'
        minute:
          oneOf:
            - type: integer
            - type: 'null'
        homeTeamId:
          oneOf:
            - type: string
            - type: 'null'
        homeTeamName:
          oneOf:
            - type: string
            - type: 'null'
        homeTeamLogo:
          oneOf:
            - type: string
            - type: 'null'
        awayTeamId:
          oneOf:
            - type: string
            - type: 'null'
        awayTeamName:
          oneOf:
            - type: string
            - type: 'null'
        awayTeamLogo:
          oneOf:
            - type: string
            - type: 'null'
        homeGoals:
          oneOf:
            - type: integer
            - type: 'null'
        awayGoals:
          oneOf:
            - type: integer
            - type: 'null'
    TeamFormEntry:
      type: object
      required: [ fixtureId, result, score, opponentName, opponentLogo ]
      properties:
        fixtureId:
          type: string
        result:
          type: string
          enum: [ W, D, L, '' ]
        score:
          oneOf:
            - type: string
            - type: 'null'
        opponentName:
          oneOf:
            - type: string
            - type: 'null'
        opponentLogo:
          oneOf:
            - type: string
            - type: 'null'
    TeamOverviewSeasonStats:
      type: object
      required: [ rank, points, played, goalDiff, wins, draws, losses, scored, conceded ]
      properties:
        rank:
          oneOf:
            - type: integer
            - type: 'null'
        points:
          oneOf:
            - type: integer
            - type: 'null'
        played:
          oneOf:
            - type: integer
            - type: 'null'
        goalDiff:
          oneOf:
            - type: integer
            - type: 'null'
        wins:
          oneOf:
            - type: integer
            - type: 'null'
        draws:
          oneOf:
            - type: integer
            - type: 'null'
        losses:
          oneOf:
            - type: integer
            - type: 'null'
        scored:
          oneOf:
            - type: integer
            - type: 'null'
        conceded:
          oneOf:
            - type: integer
            - type: 'null'
    TeamStandingStats:
      type: object
      required: [ played, win, draw, lose, goalsFor, goalsAgainst ]
      properties:
        played:
          oneOf:
            - type: integer
            - type: 'null'
        win:
          oneOf:
            - type: integer
            - type: 'null'
