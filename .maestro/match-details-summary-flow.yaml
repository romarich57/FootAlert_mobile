appId: com.footalert.app
---
- launchApp:
    clearState: true
- openLink: footalert://match/101
- assertVisible:
    id: match-details-screen
- assertNotVisible:
    id: match-details-error
- assertVisible:
    id: match-details-tab-primary
- tapOn:
    id: match-details-tab-primary
- assertVisible:
    id: match-primary-tab
- assertVisible:
    id: match-summary-final
- assertVisible:
    id: match-summary-key-moments
