name: BFF Quality

on:
  push:
    paths:
      - footalert-bff/**
      - .github/workflows/bff-quality.yml
  pull_request:
    paths:
      - footalert-bff/**
      - .github/workflows/bff-quality.yml

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: footalert-bff

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm
          cache-dependency-path: footalert-bff/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Refresh route catalog
        run: npm run routes:catalog

      - name: Route suites
        run: npm run test:routes

      - name: Pagination suites
        run: npm run test:pagination

      - name: Cache strict suites
        run: npm run test:cache-strict

      - name: Security auth suites
        run: npm run test:security-auth

      - name: Route file-size gates
        run: npm run routes:line-limits

      - name: BFF black-box E2E
        run: npm run test:e2e:bff

      - name: Coverage
        run: npm run test:coverage

      - name: Coverage critical gates
        run: npm run coverage:critical
