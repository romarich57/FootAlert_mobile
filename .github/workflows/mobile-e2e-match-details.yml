name: Mobile E2E Match Details

on:
  pull_request:
    paths:
      - src/ui/features/matches/details/**
      - scripts/e2e/**
      - .maestro/**
      - .github/workflows/mobile-e2e-match-details.yml
  push:
    branches:
      - main
    paths:
      - src/ui/features/matches/details/**
      - scripts/e2e/**
      - .maestro/**
      - .github/workflows/mobile-e2e-match-details.yml
  workflow_dispatch:

jobs:
  android-maestro:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run Maestro flows on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          ram-size: 4096M
          heap-size: 1024M
          script: |
            node scripts/e2e/mobile-bff-stub.mjs > /tmp/mobile-bff-stub.log 2>&1 &
            for attempt in $(seq 1 20); do
              if curl -fsS 'http://127.0.0.1:3001/v1/matches/101?timezone=Europe%2FParis' >/dev/null; then
                echo "Mobile BFF stub is ready."
                break
              fi
              if [ "$attempt" = "20" ]; then
                echo "Mobile BFF stub failed to start."
                cat /tmp/mobile-bff-stub.log || true
                exit 1
              fi
              sleep 1
            done
            npm run start -- --port 8081 > /tmp/metro.log 2>&1 &
            npx react-native run-android --mode debug --active-arch-only
            adb reverse tcp:8081 tcp:8081
            maestro test .maestro/match-details-summary-flow.yaml --format junit --output /tmp/maestro-summary-report.xml
            maestro test .maestro/match-details-empty-blocks-flow.yaml --format junit --output /tmp/maestro-empty-blocks-report.xml
            maestro test .maestro/match-details-error-flow.yaml --format junit --output /tmp/maestro-error-report.xml

      - name: Upload Maestro report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-match-details-report
          path: |
            /tmp/maestro-summary-report.xml
            /tmp/maestro-empty-blocks-report.xml
            /tmp/maestro-error-report.xml
            /tmp/metro.log
            /tmp/mobile-bff-stub.log
