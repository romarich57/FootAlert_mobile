name: Multi-Platform Quality

on:
  push:
    paths:
      - 'packages/**'
      - 'web/**'
      - 'desktop/**'
      - '.github/workflows/multi-platform-quality.yml'
  pull_request:
    paths:
      - 'packages/**'
      - 'web/**'
      - 'desktop/**'
      - '.github/workflows/multi-platform-quality.yml'

jobs:
  contract-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Validate API contract
        run: npm run contract:check

  app-core-quality:
    runs-on: ubuntu-latest
    needs: contract-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm

      - name: Install app-core dependencies
        run: npm --prefix packages/app-core install --no-audit --no-fund

      - name: Typecheck shared app-core
        run: npm --prefix packages/app-core run typecheck

      - name: Run shared app-core tests
        run: npm --prefix packages/app-core run test:contract-runtime

  web-quality:
    runs-on: ubuntu-latest
    needs: [contract-check, app-core-quality]
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm

      - name: Install web dependencies
        run: npm install

      - name: Typecheck web
        run: npm run typecheck

  web-parity-smoke:
    runs-on: ubuntu-latest
    needs: [web-quality, app-core-quality]
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm

      - name: Install web dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run web parity smoke journeys
        run: npm run test:parity

  web-build:
    runs-on: ubuntu-latest
    needs: [web-quality, web-parity-smoke]
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm

      - name: Install web dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error

  desktop-build:
    runs-on: ubuntu-latest
    needs: [web-build, web-parity-smoke]
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm

      - name: Install desktop dependencies
        run: npm install

      - name: Typecheck desktop
        run: npm run typecheck

      - name: Build desktop shell assets
        run: npm run build

      - name: Desktop parity smoke checks
        run: npm run smoke

      - name: Upload desktop bundle scaffold
        uses: actions/upload-artifact@v4
        with:
          name: desktop-tauri-scaffold
          path: |
            desktop/src-tauri
            web/dist
          if-no-files-found: error
