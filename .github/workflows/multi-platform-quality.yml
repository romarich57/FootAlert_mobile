name: Multi-Platform Quality

on:
  push:
    paths:
      - 'packages/**'
      - 'web/**'
      - 'desktop/**'
      - '.github/workflows/multi-platform-quality.yml'
  pull_request:
    paths:
      - 'packages/**'
      - 'web/**'
      - 'desktop/**'
      - '.github/workflows/multi-platform-quality.yml'

jobs:
  contract-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Validate API contract
        run: npm run contract:check

  web-quality:
    runs-on: ubuntu-latest
    needs: contract-check
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm

      - name: Install web dependencies
        run: npm install

      - name: Typecheck web
        run: npm run typecheck

  web-build:
    runs-on: ubuntu-latest
    needs: web-quality
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm

      - name: Install web dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error

  desktop-build:
    runs-on: ubuntu-latest
    needs: web-build
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm

      - name: Install desktop dependencies
        run: npm install

      - name: Typecheck desktop
        run: npm run typecheck

      - name: Build desktop shell assets
        run: npm run build

      - name: Upload desktop bundle scaffold
        uses: actions/upload-artifact@v4
        with:
          name: desktop-tauri-scaffold
          path: |
            desktop/src-tauri
            web/dist
          if-no-files-found: error
